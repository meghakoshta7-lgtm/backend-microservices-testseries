services:
  - type: web
    name: backend-test-gateway
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:gateway
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVICE_NAME
        value: gateway
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: APP_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: EMAIL_ENABLED
        value: "false"
      - key: NOUGAT_API_URL
        sync: false

  - type: web
    name: nougat-ocr-service
    runtime: python
    plan: starter
    branch: main
    buildCommand: pip install -r nougat_service/requirements.txt
    startCommand: cd nougat_service && python app.py
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8503"
      - key: NOUGAT_MODEL
        value: facebook/nougat-base
